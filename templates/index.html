<!doctype html>
<html>
  <head>
    <title>Image Text Reader</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background:
          linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
          url("/static/bg.webp");
        background-size: cover;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: white;
      }

      .container {
        background: rgba(17, 24, 39, 0.7);
        backdrop-filter: blur(10px);
        border-radius: 16px;
        padding: 35px;
        width: 420px;
        text-align: center;
      }

      .upload-box {
        border: 2px dashed rgba(255, 255, 255, 0.2);
        padding: 20px;
        border-radius: 10px;
      }

      input[type="file"] {
        margin-top: 10px;
      }

      .btn {
        margin-top: 15px;
        background: purple;
        padding: 10px;
        border: none;
        width: 100%;
        color: white;
        border-radius: 8px;
        cursor: pointer;
      }

      .preview img {
        max-width: 100%;
        margin-top: 10px;
        border-radius: 10px;
      }

      .result {
        margin-top: 20px;
        background: rgba(124, 58, 237, 0.1);
        padding: 12px;
        border-radius: 8px;
        text-align: left;
        max-height: 200px;
        overflow-y: auto;
        white-space: pre-wrap;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>AI Image Text Reader</h2>

      <form action="/upload" method="post" enctype="multipart/form-data">
        <div class="upload-box">
          <input
            type="file"
            name="image"
            accept="image/*"
            onchange="preview(event)"
            required
          />
        </div>
        <button class="btn" type="submit">Extract Text</button>
      </form>

      <div class="preview" id="preview"></div>

      {% if text %}
      <div class="result">
        <strong>Extracted Text:</strong><br /><br />
        {{ text }}
      </div>
      {% endif %} {% if meaning %}
      <div class="result">
        <strong>Meaning:</strong><br /><br />
        {{ meaning }}
      </div>
      {% endif %} {% if text %}
      <button class="btn" onclick="playAudio()">🔊 Play Again</button>
      {% endif %}
    </div>

    <script>
      function preview(e) {
        const img = document.createElement("img");
        img.src = URL.createObjectURL(e.target.files[0]);
        const preview = document.getElementById("preview");
        preview.innerHTML = "";
        preview.appendChild(img);
      }

      function playAudio() {
        const audio = new Audio("/static/speech.mp3");
        audio.play();
      }

      // 🔥 AUTO PLAY WITH RETRY
      function tryAutoPlay() {
        const audio = new Audio("/static/speech.mp3");

        audio.play().then(() => {
          console.log("Auto play success");
        }).catch(() => {
          setTimeout(tryAutoPlay, 1000);
        });
      }

      window.onload = function () {
        {% if text %}
        setTimeout(tryAutoPlay, 1500);
        {% endif %}
      };
    </script>
  </body>
</html>
