<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Segoe UI;
background:#111827;
color:white;
}

.box{
background:#1f2937;
padding:40px;
border-radius:10px;
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:6px;
}

button{
width:100%;
padding:10px;
background:#7c3aed;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="box">

<h2>Login</h2>

<form method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
